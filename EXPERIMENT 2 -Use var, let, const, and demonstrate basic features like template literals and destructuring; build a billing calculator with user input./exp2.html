<!DOCTYPE html>
<html>
<head>
    <title>Billing Calculator</title>
</head>
<body>

    <h2>Billing Receipt</h2>
    
    <pre id="receiptBox" style="background: #f0f0f0; padding: 15px; font-family: monospace; font-size: 16px; width: 320px; border: 1px solid #ccc;"></pre>

<script>
    
    const GST_RATE = 0.18;

    
    var customerData = {
        customerName: prompt("Enter Customer Name:")
    };

    var productData = {
        productName: prompt("Enter Product Name:"),
        quantity: parseInt(prompt("Enter Quantity:")),
        pricePerItem: parseFloat(prompt("Enter Price Per Item (₹):"))
    };

    
    var { customerName } = customerData;
    var { productName, quantity, pricePerItem } = productData;

    
    let total = quantity * pricePerItem;
    let gstAmount = total * GST_RATE;
    let finalBill = total + gstAmount;

    
    var receiptText = `
================================
        BILLING RECEIPT        
================================
Customer Name : ${customerName}
Product Name  : ${productName}
Quantity      : ${quantity}
Price / Item  : ₹${pricePerItem.toFixed(2)}
--------------------------------
Total         : ₹${total.toFixed(2)}
GST (18%)     : ₹${gstAmount.toFixed(2)}
--------------------------------
FINAL BILL    : ₹${finalBill.toFixed(2)}
================================`;

    // Immediately push the text into our HTML container on page load
    document.getElementById("receiptBox").innerText = receiptText;
</script>

</body>
</html>
