<!DOCTYPE html>
<html>
    <title>
        SIT NAGPUR
    </title>
<head>
<style>
 
  body {
    background-image: url('https://image-static.collegedunia.com/public/reviewPhotos/1100142/IMG_3297.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    font-size: 20px;
    text-align: center;
    padding: 40px 20px;
    margin: 0;
  }

  
  h1 {
    color: #FF5722; /* Vibrant orange-red color */
    font-size: 42px;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    margin-bottom: 30px;
  }

  
  button {
    font-size: 18px;
    padding: 12px 24px;
    background-color: #2d56df;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
  }
  button:hover {
    background-color: #921057;
  }

  
  #alertBox {
    display: none; /* Starts hidden */
    background-color: #e6f2ff; /* Light blue background */
    border: 3px solid #0066cc; /* Deep blue border */
    color: #003366; /* Dark blue text */
    padding: 15px;
    margin: 40px auto;
    width: 40%; /* Keeps it small and tidy */
    font-weight: bold;
    font-size: 22px;
    border-radius: 8px;
    text-align: center; /* Centers the text inside */
    box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

 
  <h1>Welcome to SIT Nagpur</h1>

  
  <button onclick="showAlert();">Show Student Info</button>

  
  <div id="alertBox">
    Student Info: Anaya Shende 
    PRN: 24070521213
  </div>

  <script>
  
    function showAlert() {
      document.getElementById("alertBox").style.display = "block";
    }
  </script>

</body>
</html>
