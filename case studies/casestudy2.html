<!DOCTYPE html>
<html>
<head>
    <title>Shopping Bill</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 30px;
            background-color: white;
            color: black;
        }

        h1 {
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }

        .row {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 180px;
            font-weight: bold;
        }

        input, select {
            padding: 5px;
            font-size: 14px;
        }

        button {
            padding: 8px 15px;
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
        }

        #result {
            margin-top: 30px;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h1>Shopping Bill</h1>

    <div class="row">
        <label>Customer Name:</label>
        <input type="text" id="nameInput" placeholder="Enter name">
    </div>

    <div class="row">
        <label>Phone Number:</label>
        <input type="text" id="phoneInput" placeholder="Enter phone">
    </div>

    <div class="row">
        <label>Product Name:</label>
        <input type="text" id="productInput" placeholder="Enter product">
    </div>

    <div class="row">
        <label>Quantity in KG:</label>
        <input type="number" id="qtyInput" placeholder="0">
    </div>

    <div class="row">
        <label>Rate in Rupee:</label>
        <input type="number" id="rateInput" placeholder="0">
    </div>

    <div class="row">
        <label>Discount Amount (₹):</label>
        <input type="number" id="discountInput" placeholder="0">
    </div>

    <div class="row">
        <label>GST (%):</label>
        <input type="number" id="gstInput" placeholder="0">
    </div>

    <div class="row">
        <label>Packing Charges (₹):</label>
        <input type="number" id="packingInput" placeholder="0">
    </div>

    <div class="row">
        <label>Payment Mode:</label>
        <select id="paymentInput">
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
            <option value="UPI">UPI</option>
        </select>
    </div>

    <div class="row">
        <label>Membership:</label>
        <select id="memberInput">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
        </select>
    </div>

    <button id="calcBtn">Calculate Total Bill</button>

    <div id="result"></div>

    <script>
        document.getElementById("calcBtn").addEventListener("click", function() {
            var invoiceNumber = "INV-" + Math.floor(1000 + Math.random() * 9000);
            
            const formDetails = {
                custName: document.getElementById("nameInput").value,
                phone: document.getElementById("phoneInput").value,
                product: document.getElementById("productInput").value,
                payMode: document.getElementById("paymentInput").value,
                isMember: document.getElementById("memberInput").value
            };

            const { custName, phone, product, payMode, isMember } = formDetails;

            let weight = Number(document.getElementById("qtyInput").value);
            let pricePerKg = Number(document.getElementById("rateInput").value);
            let discount = Number(document.getElementById("discountInput").value);
            let gstPercent = Number(document.getElementById("gstInput").value);
            let packing = Number(document.getElementById("packingInput").value);

            let subtotal = weight * pricePerKg; 
            subtotal = subtotal - discount;        
            
            let gstCalculatedAmount = subtotal * (gstPercent / 100);
            
            let total = subtotal + gstCalculatedAmount + packing;         

            if (isMember === "Yes") {
                total = total - 20; 
            }

            const finalReceipt = `
                <h2>INVOICE DETAILS</h2>
                Invoice No: ${invoiceNumber}<br>
                Customer: ${custName}<br>
                Phone: ${phone}<br>
                Product: ${product}<br>
                Payment Mode: ${payMode}<br>
                Membership Card: ${isMember}<br>
                -----------------------<br>
                GST Charged (${gstPercent}%): ₹${gstCalculatedAmount.toFixed(2)}<br>
                <b>Final Total Bill: ₹${total.toFixed(2)}</b>
            `;

            var outputBox = document.getElementById("result");
            outputBox.innerHTML = finalReceipt;
        });
    </script>

</body>
</html>
